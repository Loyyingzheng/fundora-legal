<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#f5efe1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
  <title>Fundoralit Invitation</title>
  <style>
    :root{--bg:#f5efe1;--card:#fffdf8;--ink:#1f2a23;--muted:#66736a;--green:#2f6b4f;--green2:#24563f;--line:#ded8ca;--danger:#a03d33;--shadow:0 18px 50px rgba(44,54,47,.12)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(180deg,#f5efe1 0%,#eef4ee 100%);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);display:grid;place-items:center;padding:24px}
    .shell{width:min(100%,460px)}.brand{display:flex;align-items:center;gap:12px;margin:0 0 16px 4px}.logo{width:44px;height:44px;border-radius:14px;background:var(--green);display:grid;place-items:center;color:white;font-weight:800;font-size:20px;box-shadow:0 8px 20px rgba(47,107,79,.25)}.brand strong{font-size:20px}.brand span{display:block;color:var(--muted);font-size:13px;margin-top:2px}
    .card{background:var(--card);border:1px solid rgba(222,216,202,.9);border-radius:24px;padding:24px;box-shadow:var(--shadow)}.eyebrow{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:999px;background:#e8f2eb;color:var(--green2);font-size:12px;font-weight:700;letter-spacing:.02em}.dot{width:7px;height:7px;border-radius:50%;background:#4d936d}
    h1{font-size:27px;line-height:1.18;margin:18px 0 8px;letter-spacing:-.02em}.sub{color:var(--muted);font-size:15px;line-height:1.55;margin:0 0 20px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0 22px}.meta div{background:#f6f4ed;border:1px solid #ebe6da;border-radius:14px;padding:12px}.meta small{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}.meta b{font-size:14px;overflow-wrap:anywhere}
    button,a.btn{width:100%;min-height:50px;border-radius:15px;border:0;font:inherit;font-weight:750;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .12s ease,opacity .12s ease}button:active,a.btn:active{transform:scale(.985)}.primary{background:var(--green);color:#fff}.primary:hover{background:var(--green2)}.secondary{margin-top:10px;background:#edf2ee;color:var(--green2);border:1px solid #d7e3da!important}.copy{margin-top:10px;background:transparent;color:var(--ink);border:1px solid var(--line)!important}.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.08em}
    .status{min-height:22px;margin:14px 0 0;color:var(--muted);font-size:13px;text-align:center}.error{color:var(--danger)}.skeleton{animation:pulse 1.3s infinite;background:#ece8dd;border-radius:8px;color:transparent!important}@keyframes pulse{50%{opacity:.55}}.foot{text-align:center;color:var(--muted);font-size:12px;margin:14px 8px 0;line-height:1.45}.hidden{display:none!important}
  </style>
</head>
<body>
  <main class="shell">
    <div class="brand"><div class="logo">F</div><div><strong>Fundoralit</strong><span>Plan together, clearly.</span></div></div>
    <section class="card" aria-live="polite">
      <div class="eyebrow"><span class="dot"></span><span id="kindLabel">Invitation</span></div>
      <h1 id="title" class="skeleton">Loading invitation</h1>
      <p id="subtitle" class="sub">Checking this invitation securely…</p>
      <div id="meta" class="meta hidden">
        <div><small>Organized by</small><b id="owner">—</b></div>
        <div><small>Members</small><b id="members">—</b></div>
      </div>
      <button id="openButton" class="primary" disabled>Open Fundoralit</button>
      <a id="installButton" class="btn secondary" href="https://play.google.com/store/apps/details?id=com.loyyingzheng.fundoraapp" rel="noopener">Install from Google Play</a>
      <button id="copyButton" class="copy hidden" type="button">Copy invite code&nbsp;<span id="code" class="code"></span></button>
      <p id="status" class="status"></p>
    </section>
    <p class="foot">For your safety, opening this link never joins a group automatically. Review the invitation in Fundoralit and tap Verify.</p>
  </main>
<script>
(() => {
  'use strict';
  const PACKAGE_NAME = 'com.loyyingzheng.fundoraapp';
  const TOKEN_RE = /^[A-Za-z0-9_-]{20,256}$/;
  const path = location.pathname.split('/').filter(Boolean);
  const kind = path[1] === 'e' ? 'event' : path[1] === 'g' ? 'goal' : null;
  const token = path[2] || '';
  const $ = id => document.getElementById(id);
  const clientEventId = () => (globalThis.crypto?.randomUUID?.() || `web-${Date.now()}-${Math.random().toString(36).slice(2)}`);
  const encodeIntentValue = value => encodeURIComponent(value).replace(/!/g, '%21');
  const setError = message => {
    $('title').classList.remove('skeleton'); $('title').textContent = 'Invitation unavailable';
    $('subtitle').textContent = message; $('status').textContent = ''; $('openButton').disabled = true;
    $('meta').classList.add('hidden'); $('copyButton').classList.add('hidden');
  };
  if (!kind || !TOKEN_RE.test(token)) { setError('This invitation link is invalid. Ask the organizer to share a new link.'); return; }

  const previewUrl = `/api/invite/${kind === 'event' ? 'e' : 'g'}/${encodeURIComponent(token)}/preview?eventId=${encodeURIComponent(clientEventId())}`;
  fetch(previewUrl, { headers: { Accept: 'application/json' }, credentials: 'omit' })
    .then(r => r.ok ? r.json() : Promise.reject(new Error('preview_failed')))
    .then(payload => {
      const data = payload?.data || payload;
      if (!data?.valid || !data?.inviteCode) throw new Error('invalid');
      const expectedType = kind === 'event' ? 'GROUP_EVENT' : 'GROUP_GOAL';
      if (data.entityType !== expectedType) throw new Error('type_mismatch');
      $('kindLabel').textContent = kind === 'event' ? 'Group event invitation' : 'Group goal invitation';
      $('title').classList.remove('skeleton'); $('title').textContent = data.entityName || (kind === 'event' ? 'Join a group event' : 'Join a group goal');
      $('subtitle').textContent = 'Open Fundoralit to review and verify this invitation.';
      $('owner').textContent = data.ownerDisplayName || 'Fundoralit member'; $('members').textContent = String(Number(data.memberCount || 0));
      $('code').textContent = data.inviteCode; $('meta').classList.remove('hidden'); $('copyButton').classList.remove('hidden'); $('openButton').disabled = false;
      const customPath = `join/${kind}/${token}`;
      const fallback = `${location.origin}${location.pathname}?open_failed=1`;
      const intentUrl = `intent://${customPath}#Intent;scheme=fundoralit;package=${PACKAGE_NAME};S.browser_fallback_url=${encodeIntentValue(fallback)};end`;
      $('openButton').onclick = () => {
        $('status').textContent = 'Opening Fundoralit…';
        fetch(`/api/invite-links/${encodeURIComponent(token)}/open-attempt`, {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'omit', keepalive:true,
          body:JSON.stringify({clientEventId:clientEventId()})
        }).catch(() => null).finally(() => { location.href = intentUrl; });
      };
      $('copyButton').onclick = async () => {
        try { await navigator.clipboard.writeText(data.inviteCode); $('status').textContent = 'Invite code copied.'; }
        catch (_) { $('status').textContent = `Invite code: ${data.inviteCode}`; }
      };
      if (new URLSearchParams(location.search).has('open_failed')) $('status').textContent = 'Could not open the app. Install Fundoralit or copy the invite code.';
    })
    .catch(() => setError('This invitation may have expired or been revoked. Ask the organizer to share a new link.'));
})();
</script>
</body>
</html>
